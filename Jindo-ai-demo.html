function useTypingEffect(text, speed, enabled) {
  const [displayed, setDisplayed] = useState("");
  const [done, setDone] = useState(false);
  useEffect(() => {
    if (!enabled || !text) { setDisplayed(text || ""); setDone(true); return; }
    setDisplayed(""); setDone(false);
    let i = 0;
    const iv = setInterval(() => { i += 3; if (i >= text.length) { setDisplayed(text); setDone(true); clearInterval(iv); } else setDisplayed(text.slice(0, i)); }, speed || 8);
    return () => clearInterval(iv);
  }, [text, speed, enabled]);
  return [displayed, done];
}

function SourceCard({ source, index, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen);
  const relColor = source.relevance > 0.7 ? "#0a7c5c" : source.relevance > 0.4 ? "#8a6d0b" : "#9c3a3a";
  const relBg = source.relevance > 0.7 ? "#e8f5ee" : source.relevance > 0.4 ? "#fef8e8" : "#fde8e8";
  const relLabel = source.relevance > 0.7 ? "High" : source.relevance > 0.4 ? "Moderate" : "Low";
  return (
    <div style={{border:"1px solid #e8e6e1",borderRadius:10,overflow:"hidden"}}>
      <button onClick={()=>setOpen(!open)} style={{width:"100%",background:open?"#fafaf8":"transparent",border:"none",padding:"11px 16px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:10,textAlign:"left"}}>
        <span style={{color:"#94918a",fontSize:11,fontWeight:600,minWidth:16,paddingTop:2}}>{index+1}</span>
        <div style={{flex:1}}>
          <div style={{color:"#1a1917",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:5}}><DocIcon />{source.doc}</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:3,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#6b6963"}}>{source.section}</span>
            <span style={{fontSize:11,color:"#94918a"}}>{source.date}</span>
            <span style={{fontSize:10,fontWeight:600,color:relColor,background:relBg,padding:"1px 8px",borderRadius:20}}>{relLabel}</span>
          </div>
        </div>
        <ChevronIcon open={open} />
      </button>
      {open && (
        <div style={{padding:"0 16px 12px 42px",animation:"fadeIn 0.15s"}}>
          <div style={{fontSize:13,lineHeight:1.75,color:"#3d3b37",background:"#fafaf8",borderRadius:8,padding:"12px 14px",borderLeft:"3px solid #d4d2cc",fontFamily:"'IBM Plex Serif', Georgia, serif"}}>
            "{source.text}"
          </div>
        </div>
      )}
    </div>
  );
}

  return (
    <div style={{animation:"fadeIn 0.3s"}}>
      <div style={{background:"#fde8e8",borderRadius:12,border:"1px solid #f5c4c4",padding:"14px 18px",marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:"#7a2828",marginBottom:4,display:"flex",alignItems:"center",gap:6}}><AlertIcon /> What happens here</div>
        <div style={{fontSize:13,color:"#5c2020",lineHeight:1.6}}>The embedding doesn't understand the query's intent, so it retrieves the wrong passages (vendor matrices, our own proposals, industry reports instead of the actual client conversation). The LLM then confidently synthesizes an answer from this wrong context — producing a plausible but dangerously incorrect analysis.</div>
      </div>
      <div style={{background:"#fff",borderRadius:14,border:"1px solid #e8e6e1",overflow:"hidden",marginBottom:16}}>
        <div style={{padding:"14px 20px 0",display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:600,color:"#9c3a3a"}}><AlertIcon /> LLM answer (from poorly retrieved context)</div>
        <div style={{padding:"14px 20px 20px",fontSize:14.5,lineHeight:1.8,color:"#2c2a27",whiteSpace:"pre-wrap"}}>
          {typed}{!done && <span style={{display:"inline-block",width:2,height:16,background:"#9c3a3a",marginLeft:2,animation:"pulse 0.8s infinite",verticalAlign:"text-bottom"}} />}
        </div>
      </div>
      {done && (
        <div style={{background:"#fde8e8",borderRadius:12,border:"1px solid #f5c4c4",padding:"16px 18px",animation:"fadeIn 0.3s"}}>
          <div style={{fontSize:13,fontWeight:600,color:"#7a2828",marginBottom:8,display:"flex",alignItems:"center",gap:6}}><AlertIcon /> Why this is dangerous</div>
          {result.llmBadRetrievalProblems.map((p,i) => (
            <div key={i} style={{fontSize:13,color:"#5c2020",lineHeight:1.6,padding:"3px 0 3px 18px",position:"relative"}}>
              <span style={{position:"absolute",left:4,top:8,width:5,height:5,borderRadius:"50%",background:"#d45c5c"}} />{p}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [query, setQuery] = useState("");
  const [followUpQuery, setFollowUpQuery] = useState("");
  const [currentResult, setCurrentResult] = useState(null);
  const [thread, setThread] = useState([]);
  const [isSearching, setIsSearching] = useState(false);
  const [showResults, setShowResults] = useState(false);
  const [animateIn, setAnimateIn] = useState(false);
  const [currentScenario, setCurrentScenario] = useState(null);
  const [mode, setMode] = useState("optionD");
  const resultsRef = useRef(null);

  const summaryText = currentResult?.confidence === "low" ? currentResult.lowConfidenceMessage : currentResult?.summary;
  const [typedSummary, typingDone] = useTypingEffect(summaryText, 8, showResults && mode === "optionD");

  const executeSearch = useCallback((searchText, isFollowUp) => {
    setIsSearching(true); setShowResults(false); setAnimateIn(false);
    setTimeout(() => {
      let result = null, scenario = null;
      if (isFollowUp && currentScenario?.followUps?.[searchText]) { result = currentScenario.followUps[searchText]; scenario = result; }
      else { result = SCENARIOS[searchText]; scenario = result; }
      if (result) { setCurrentResult(result); setCurrentScenario(scenario); setThread(prev => isFollowUp ? [...prev, searchText] : [searchText]); }
      setIsSearching(false); setShowResults(true);
      setTimeout(() => setAnimateIn(true), 50);
      setTimeout(() => { if(resultsRef.current) resultsRef.current.scrollIntoView({behavior:"smooth",block:"start"}); }, 100);
    }, mode === "searchOnly" ? 500 : 1600);
  }, [currentScenario, mode]);

  const handleSearch = (e) => { if(e) e.preventDefault(); if (query.trim()) executeSearch(query.trim(), false); };
  const handleFollowUp = (e) => { if(e) e.preventDefault(); if (followUpQuery.trim()) { const q = followUpQuery.trim(); setFollowUpQuery(""); executeSearch(q, true); } };
  const handleNewSearch = () => { setCurrentResult(null); setCurrentScenario(null); setThread([]); setQuery(""); setFollowUpQuery(""); setShowResults(false); setAnimateIn(false); window.scrollTo({top:0,behavior:"smooth"}); };

  const availableFollowUps = mode === "optionD" && currentScenario?.followUps ? Object.keys(currentScenario.followUps) : [];

  return (
    <div style={{minHeight:"100vh",background:"#f5f4f0"}}>
      <header style={{background:"#1a1917",borderBottom:"1px solid #2a2926"}}>
        <div style={{maxWidth:880,margin:"0 auto",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:28,height:28,borderRadius:7,background:"linear-gradient(135deg, #c8a55a, #8a6d2b)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#1a1917"}}>J</div>
            <div>
              <div style={{fontSize:14,fontWeight:600,color:"#f0efe9"}}>Jindo</div>
              <div style={{fontSize:10,color:"#7a7770"}}>AI—Powered Meeting Intelligence</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <ModeToggle mode={mode} setMode={setMode} />
            {showResults && <button onClick={handleNewSearch} style={{display:"flex",alignItems:"center",gap:5,background:"#2a2926",border:"1px solid #3a3936",color:"#c8c5bd",fontSize:12,fontWeight:500,padding:"6px 12px",borderRadius:8,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#3a3936"} onMouseLeave={e=>e.currentTarget.style.background="#2a2926"}><NewIcon /> New</button>}
          </div>
        </div>
      </header>

      <main style={{maxWidth:880,margin:"0 auto",padding:"0 24px"}}>
        {!showResults && !isSearching && (
          <div style={{paddingTop:56,paddingBottom:16,animation:"fadeIn 0.5s"}}>
            <div style={{fontSize:11,fontWeight:600,color:MODE_META[mode].color,background:MODE_META[mode].bg,display:"inline-flex",padding:"4px 12px",borderRadius:20,marginBottom:14,letterSpacing:"0.03em"}}>{MODE_META[mode].tagline}</div>
            <h1 style={{fontSize:28,fontWeight:300,color:"#1a1917",margin:"0 0 6px",letterSpacing:"-0.02em",lineHeight:1.25}}>
              {mode==="optionD" ? <span>Search client <strong>intelligence</strong></span> : mode==="searchOnly" ? <span>Semantic search <strong>without NL understanding</strong></span> : <span>LLM synthesis <strong>from wrong context</strong></span>}
            </h1>
            <p style={{fontSize:14,color:"#7a7770",margin:"0 0 20px",lineHeight:1.6,maxWidth:600}}>
              {mode==="optionD" ? "The LLM understands your question, retrieves the right passages, synthesizes an answer, and shows sources for verification." : mode==="searchOnly" ? "The query is embedded directly without NL understanding. The embedding model matches on surface keywords, not intent \u2014 so it often retrieves the wrong documents entirely." : "The embedding retrieves the wrong passages (same as search-only). Then the LLM confidently synthesizes an answer from those wrong passages \u2014 producing plausible but dangerous misinformation."}
            </p>
          </div>
        )}

        <div style={{position:showResults||isSearching?"sticky":"relative",top:showResults||isSearching?0:"auto",zIndex:10,background:"#f5f4f0",paddingTop:showResults||isSearching?14:0,paddingBottom:10}}>
          <form onSubmit={handleSearch}>
            <div style={{display:"flex",alignItems:"center",background:"#fff",border:"1px solid #d4d2cc",borderRadius:14,padding:"4px 6px 4px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
              <span style={{color:"#94918a",display:"flex",marginRight:8,flexShrink:0}}><SearchIcon /></span>
              <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Ask about client meetings, concerns, or findings..."
                style={{flex:1,border:"none",outline:"none",fontSize:15,padding:"11px 0",background:"transparent",color:"#1a1917"}}
                onFocus={e=>e.target.parentElement.style.borderColor="#8a6d2b"} onBlur={e=>e.target.parentElement.style.borderColor="#d4d2cc"} />
              <button type="submit" style={{background:"#1a1917",color:"#f0efe9",border:"none",borderRadius:10,padding:"9px 18px",fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>Search</button>
            </div>
          </form>
        </div>

        {!showResults && !isSearching && (
          <div style={{animation:"fadeIn 0.4s 0.1s both"}}>
            <div style={{fontSize:11,fontWeight:600,color:"#94918a",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Try an example \u2014 then switch modes to compare</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {SUGGESTED_QUERIES.map(q => (
                <button key={q} onClick={()=>{setQuery(q);executeSearch(q,false);}}
                  style={{display:"flex",alignItems:"center",gap:10,background:"#fff",border:"1px solid #e8e6e1",borderRadius:10,padding:"11px 16px",cursor:"pointer",textAlign:"left",fontSize:13.5,color:"#3d3b37",transition:"all 0.15s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="#c8a55a";e.currentTarget.style.background="#fdfcfa";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="#e8e6e1";e.currentTarget.style.background="#fff";}}>
                  <span style={{color:"#c8a55a",flexShrink:0}}><SearchIcon /></span>{q}
                </button>
              ))}
            </div>
            <div style={{marginTop:20,padding:"14px 18px",background:"#fff",borderRadius:12,border:"1px solid #e8e6e1"}}>
              <div style={{fontSize:11,fontWeight:600,color:"#94918a",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Demo walkthrough</div>
              <div style={{fontSize:13,color:"#6b6963",lineHeight:1.65}}>
                Run a query in <strong style={{color:"#0a7c5c"}}>Smart Search</strong> first. Then click <strong>New</strong> and run the same query in <strong style={{color:"#6b5510"}}>Semantic search only</strong> to see how the embedding misunderstands the question. Then try <strong style={{color:"#9c3a3a"}}>LLM + naive retrieval</strong> to see the LLM answer from those wrong passages.
              </div>
            </div>
          </div>
        )}

        {isSearching && (
          <div style={{padding:"50px 0",textAlign:"center",animation:"fadeIn 0.2s"}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:10,background:"#fff",border:"1px solid #e8e6e1",borderRadius:12,padding:"12px 22px"}}>
              <div style={{display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:MODE_META[mode].color,animation:"pulse 1.2s ease-in-out "+i*0.2+"s infinite"}} />)}</div>
              <span style={{fontSize:13,color:"#6b6963",fontWeight:500}}>
                {mode==="searchOnly"?"Embedding and searching...":mode==="llmBadRetrieval"?"Retrieving and generating...":"Understanding, retrieving, synthesizing..."}
              </span>
            </div>
          </div>
        )}

        {showResults && currentResult && (
          <div ref={resultsRef} style={{paddingBottom:60,animation:animateIn?"slideUp 0.35s":"none",opacity:animateIn?1:0}}>
            <PipelineDiagram mode={mode} />

            {thread.length > 0 && mode === "optionD" && (
              <div style={{display:"flex",alignItems:"center",gap:5,padding:"2px 0 8px",flexWrap:"wrap"}}>
                {thread.map((t,i) => (
                  <span key={i} style={{display:"flex",alignItems:"center",gap:4}}>
                    {i>0 && <ArrowIcon />}
                    <span style={{fontSize:12,color:i===thread.length-1?"#1a1917":"#94918a",fontWeight:i===thread.length-1?600:400,maxWidth:280,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t}</span>
                  </span>
                ))}
              </div>
            )}

            {mode === "optionD" && (
              <div>
                <div style={{background:"#fff",borderRadius:14,border:"1px solid #e8e6e1",marginBottom:16,overflow:"hidden"}}>
                  <div style={{padding:"14px 20px 0",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    {currentResult.confidence==="high" && <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:600,color:"#8a6d2b"}}><SparkleIcon /> AI summary</span>}
                    {currentResult.confidence==="low" && <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:600,color:"#9c3a3a"}}><AlertIcon /> Low confidence</span>}
                    {currentResult.searchQuery===null && <span style={{fontSize:11,color:"#94918a",background:"#f0efe9",padding:"2px 8px",borderRadius:20}}>From thread context</span>}
                    {currentResult.searchQuery && thread.length>1 && <span style={{fontSize:11,color:"#94918a",background:"#f0efe9",padding:"2px 8px",borderRadius:20}}>Searched: "{currentResult.searchQuery}"</span>}
                  </div>
                  {currentResult.confidence==="low" && <div style={{margin:"12px 20px 0",padding:"10px 14px",background:"#fde8e8",borderRadius:8,border:"1px solid #f5c4c4",fontSize:12,color:"#7a2828",lineHeight:1.5}}>Low relevance. The information below may not directly answer your question.</div>}
                  <div style={{padding:"14px 20px 20px",fontSize:14.5,lineHeight:1.8,color:"#2c2a27",whiteSpace:"pre-wrap"}}>
                    {typedSummary}{!typingDone && <span style={{display:"inline-block",width:2,height:16,background:"#c8a55a",marginLeft:2,animation:"pulse 0.8s infinite",verticalAlign:"text-bottom"}} />}
                  </div>
                </div>
                {currentResult.sources && (
                  <div style={{marginBottom:16}}>
                    <div style={{fontSize:11,fontWeight:600,color:"#94918a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Sources ({currentResult.sources.length})</div>
                    <div style={{display:"flex",flexDirection:"column",gap:7}}>{currentResult.sources.map((s,i)=><SourceCard key={i} source={s} index={i} defaultOpen={i===0} />)}</div>
                  </div>
                )}
                {currentResult.sources===null && <div style={{padding:"14px 18px",background:"#f0efe9",borderRadius:10,marginBottom:16,fontSize:13,color:"#7a7770"}}>Answered from thread context. Original sources still apply.</div>}
                {typingDone && (
                  <div style={{background:"#fff",borderRadius:14,border:"1px solid #e8e6e1",padding:"14px 18px",animation:"fadeIn 0.3s"}}>
                    <div style={{fontSize:11,fontWeight:600,color:"#94918a",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Follow up</div>
                    <form onSubmit={handleFollowUp}>
                      <div style={{display:"flex",gap:8}}>
                        <input value={followUpQuery} onChange={e=>setFollowUpQuery(e.target.value)} placeholder="Refine or ask a follow-up..."
                          style={{flex:1,border:"1px solid #e8e6e1",borderRadius:10,padding:"9px 14px",fontSize:13.5,outline:"none",background:"#fafaf8",color:"#1a1917"}}
                          onFocus={e=>e.target.style.borderColor="#c8a55a"} onBlur={e=>e.target.style.borderColor="#e8e6e1"} />
                        <button type="submit" style={{background:"#f0efe9",color:"#3d3b37",border:"1px solid #d4d2cc",borderRadius:10,padding:"9px 16px",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}
                          onMouseEnter={e=>{e.target.style.background="#1a1917";e.target.style.color="#f0efe9";}}
                          onMouseLeave={e=>{e.target.style.background="#f0efe9";e.target.style.color="#3d3b37";}}>Follow up</button>
                      </div>
                    </form>
                    {availableFollowUps.length > 0 && (
                      <div style={{marginTop:8,display:"flex",gap:5,flexWrap:"wrap"}}>
                        {availableFollowUps.map(q => (
                          <button key={q} onClick={()=>{setFollowUpQuery(q);executeSearch(q,true);}}
                            style={{background:"#fafaf8",border:"1px solid #e8e6e1",borderRadius:8,padding:"5px 11px",fontSize:12,color:"#6b6963",cursor:"pointer",transition:"all 0.15s"}}
                            onMouseEnter={e=>{e.currentTarget.style.borderColor="#c8a55a";e.currentTarget.style.color="#3d3b37";}}
                            onMouseLeave={e=>{e.currentTarget.style.borderColor="#e8e6e1";e.currentTarget.style.color="#6b6963";}}>{q}</button>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {mode === "searchOnly" && <SearchOnlyView result={currentResult} />}
            {mode === "llmBadRetrieval" && currentResult.llmBadRetrievalResponse && <LLMBadRetrievalView result={currentResult} />}
            {mode === "llmBadRetrieval" && !currentResult.llmBadRetrievalResponse && (
              <div style={{padding:"30px 20px",background:"#fff",borderRadius:14,border:"1px solid #e8e6e1",textAlign:"center",fontSize:14,color:"#7a7770"}}>Comparison not available for this query. Try the first example.</div>
            )}
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
